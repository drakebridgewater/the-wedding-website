<!-- Contact -->
<section id="contact" class="py-20 px-4 bg-accent-light border-t border-stone-100">
    <div class="max-w-xl mx-auto text-center">
      <h2 class="font-script text-5xl text-stone-700 mb-4">Get in Touch</h2>
      <div class="w-12 h-px bg-accent mx-auto mb-8"></div>
      <p class="text-stone-500 leading-relaxed mb-8">If you have any questions, don't hesitate to reach out.</p>
      {% if support_email %}
      <a href="mailto:{{ support_email }}"
         class="inline-flex items-center gap-2 text-accent hover:text-accent transition-colors font-display italic text-lg">
        <i class="fa fa-envelope-o"></i>
        {{ support_email }}
      </a>
      {% endif %}
    </div>
  </section>
