<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-stone-100">
        <th class="pb-2 text-left font-medium text-stone-500">Party</th>
        <th class="pb-2 text-left font-medium text-stone-500">Category</th>
        <th class="pb-2 text-left font-medium text-stone-500">Sent to</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-stone-50">
    {% for party in party_list %}
      <tr>
        <td class="py-1.5"><a href="{% url 'admin:guests_party_change' party.pk %}" class="text-rose-700 hover:underline">{{ party.name }}</a></td>
        <td class="py-1.5 text-stone-500">{{ party.category }}</td>
        <td class="py-1.5 text-stone-500">{{ party.guest_emails|join:", " }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="3" class="py-3 text-stone-400 text-center">None.</td></tr>
    {% endfor %}
    </tbody>
  </table>
</div>
